services:
  - type: web
    name: ai-incident-intelligence-platform-backend
    runtime: docker
    repo: https://github.com/mariapreethi-12/ai-incident-intelligence-platform
    branch: main
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEMO_MODE
        value: true
      - key: KAFKA_ENABLED
        value: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: localhost:9092
